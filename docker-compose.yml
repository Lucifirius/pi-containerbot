version: "3.9"

# ── Shared volume for config + token persistence ──────────────────────────────
volumes:
  fuel_data:

# ── Reusable config block ─────────────────────────────────────────────────────
x-common: &common
  build: .
  image: eve-fuel-monitor
  volumes:
    # Mount the local data/ directory into /data inside the container.
    # This is where config.yaml is read from and tokens.json is written to.
    - ./data:/data
  environment:
    CONFIG_PATH: /data/config.yaml
    TOKEN_PATH:  /data/tokens.json
    CALLBACK_HOST: localhost      # must match the redirect URI in your ESI app
    CALLBACK_PORT: "8182"
    PYTHONUNBUFFERED: "1"

services:

  # ── auth ────────────────────────────────────────────────────────────────────
  # Run once interactively to complete the EVE SSO login.
  #
  #   docker compose run --rm --service-ports auth
  #
  # The container will print a URL. Open it in your host browser.
  # EVE SSO redirects to localhost:8182/callback which the container catches.
  # On success, tokens.json is written into ./data/ and the container exits.
  auth:
    <<: *common
    container_name: eve-fuel-auth
    ports:
      - "8182:8182"          # publish so the browser callback reaches the container
    command: python fuel_monitor.py --auth
    restart: "no"

  # ── monitor ─────────────────────────────────────────────────────────────────
  # Long-running service that polls ESI and posts to Discord on a schedule.
  #
  #   docker compose up -d monitor
  #   docker compose logs -f monitor
  #
  monitor:
    <<: *common
    container_name: eve-fuel-monitor
    environment:
      CONFIG_PATH:     /data/config.yaml
      TOKEN_PATH:      /data/tokens.json
      CALLBACK_HOST:   localhost
      CALLBACK_PORT:   "8182"
      PYTHONUNBUFFERED: "1"
      WATCH_INTERVAL:  "60"     # minutes between checks — change here or in .env
    restart: unless-stopped
    # Health check: verify the token file exists (set by auth step)
    healthcheck:
      test: ["CMD", "python", "-c", "import json,sys; json.load(open('/data/tokens.json'))"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── discord-test ─────────────────────────────────────────────────────────────
  # Send a one-shot test embed to verify the webhook is working.
  #
  #   docker compose run --rm discord-test
  #
  discord-test:
    <<: *common
    container_name: eve-fuel-discord-test
    command: python fuel_monitor.py --discord-test
    restart: "no"
