version: "3.9"

# ── Shared config block ───────────────────────────────────────────────────────
x-common: &common
  build: .
  image: eve-fuel-monitor
  volumes:
    # Local data/ directory is mounted at /data inside the container.
    # config.yaml is read from here; tokens.json is written here.
    - ./data:/data
  environment:
    CONFIG_PATH:      /data/config.yaml
    TOKEN_PATH:       /data/tokens.json
    PYTHONUNBUFFERED: "1"

services:

  # ── auth ────────────────────────────────────────────────────────────────────
  # Run once interactively to complete EVE SSO login.
  # No ports needed — auth is done by pasting the redirect URL in the terminal.
  #
  #   docker compose run --rm auth
  #
  # Follow the on-screen instructions:
  #   1. Open the printed URL in your browser
  #   2. Log in with your Director character
  #   3. Copy the full redirect URL from your browser's address bar
  #   4. Paste it into the terminal prompt
  # tokens.json is written to ./data/ and the container exits.
  auth:
    <<: *common
    container_name: eve-fuel-auth
    command: python fuel_monitor.py --auth
    restart: "no"
    stdin_open: true   # keep stdin open so input() works
    tty: true          # allocate a pseudo-TTY for a clean prompt

  # ── monitor ─────────────────────────────────────────────────────────────────
  # Long-running service — polls ESI and posts to Discord on a schedule.
  #
  #   docker compose up -d monitor
  #   docker compose logs -f monitor
  #
  monitor:
    <<: *common
    container_name: eve-fuel-monitor
    environment:
      CONFIG_PATH:      /data/config.yaml
      TOKEN_PATH:       /data/tokens.json
      PYTHONUNBUFFERED: "1"
      WATCH_INTERVAL:   "60"    # minutes between checks; override in .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import json; json.load(open('/data/tokens.json'))"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── discord-test ─────────────────────────────────────────────────────────────
  # Send a one-shot test embed to verify the webhook is working.
  #
  #   docker compose run --rm discord-test
  #
  discord-test:
    <<: *common
    container_name: eve-fuel-discord-test
    command: python fuel_monitor.py --discord-test
    restart: "no"
